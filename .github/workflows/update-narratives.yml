name: AI Narratives Update

on:
  # SCHEDULE RETIRED — the page narrative (short/full outlook + key risks) is now
  # produced by research-evaluation.yml in the same per-ticker call that scores
  # the research card (same Level 0 facts, same Gemini model). Kept for manual
  # runs / the legacy companies path only.
  # schedule:
  #   - cron: "0 4 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Narrative Updater
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: python update_ai_narratives.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true  # GitHub artifact-service outages must not red-flag a clean run
        with:
          name: update-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
