name: AI Narratives Update

on:
  schedule:
    # Runs at 4:00 AM UTC daily (after EODHD at 3:30)
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force-refresh narratives, ignoring the 90-day staleness gate. Use after a prompt change."
        type: boolean
        default: false
      ticker:
        description: "Limit to a single ticker (e.g. SEZL). Leave blank to process every company."
        type: string
        default: ""

jobs:
  update:
    runs-on: ubuntu-latest
    # 30m fits the nightly incremental cadence; a global --force sweep
    # over ~300 tickers can run longer once Gemini latency stacks up.
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Narrative Updater
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            ARGS="$ARGS --ticker ${{ github.event.inputs.ticker }}"
          fi
          python update_ai_narratives.py $ARGS

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true  # GitHub artifact-service outages must not red-flag a clean run
        with:
          name: update-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
