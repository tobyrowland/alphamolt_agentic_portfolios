name: Bear Evaluation

on:
  # SCHEDULE RETIRED — the bear side now runs inside verdict-evaluation.yml
  # (bull + bear over one shared batch / clock). Kept for manual single-side
  # runs and backfills only.
  # schedule:
  #   - cron: "0 4 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  bear-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bear Evaluation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bear_evaluation.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true  # GitHub artifact-service outages must not red-flag a clean run
        with:
          name: bear-eval-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
